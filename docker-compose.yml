version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: secvuln_db
    environment:
      POSTGRES_DB: secvuln
      POSTGRES_USER: secvuln
      POSTGRES_PASSWORD: secvuln_pass
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U secvuln']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
