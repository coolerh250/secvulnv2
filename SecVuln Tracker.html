<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecVuln Tracker — 資訊安全弱點追蹤系統</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: 'IBM Plex Sans', system-ui, sans-serif; background: #0a0e1a; color: #e0e4f0; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e2540; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2a3358; }
    select option { background: #131829; color: #e0e4f0; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @media print {
      body { background: #fff; color: #000; }
      #root > div > div:first-child { display: none !important; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="app-styles.jsx"></script>
  <script type="text/babel" src="auth-context.jsx"></script>
  <script type="text/babel" src="app-layout.jsx"></script>
  <script type="text/babel" src="dashboard-page.jsx"></script>
  <script type="text/babel" src="search-page.jsx"></script>
  <script type="text/babel" src="devices-page.jsx"></script>
  <script type="text/babel" src="settings-page.jsx"></script>
  <script type="text/babel" src="users-page.jsx"></script>
  <script type="text/babel" src="login-page.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentHue": 170,
      "layout": "sidebar",
      "density": "comfortable"
    }/*EDITMODE-END*/;

    function AppShell() {
      const { currentUser, can } = useAuth();
      const [page, setPage] = React.useState('dashboard');
      const [lang, setLang] = React.useState('zh');
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [searchPreset, setSearchPreset] = React.useState(null);

      // Redirect to dashboard if current page becomes inaccessible
      React.useEffect(() => {
        if (!currentUser) return;
        const pagePerms = { users: 'users', settings: 'settings' };
        if (pagePerms[page] && !can(pagePerms[page], 'view')) setPage('dashboard');
      }, [currentUser, page]);

      const notifications = [
        { cveId: 'CVE-2026-21345', severity: 'CRITICAL', text: '發現新的嚴重弱點，影響 FortiOS SSL-VPN', textEn: 'New critical vulnerability found affecting FortiOS SSL-VPN', time: '2 小時前', read: false },
        { cveId: 'CVE-2026-20198', severity: 'HIGH', text: 'PAN-OS GlobalProtect 權限提升弱點', textEn: 'PAN-OS GlobalProtect privilege escalation vulnerability', time: '6 小時前', read: false },
        { cveId: 'CVE-2026-16432', severity: 'CRITICAL', text: 'FortiOS IPSec VPN 緩衝區溢位', textEn: 'FortiOS IPSec VPN buffer overflow', time: '1 天前', read: true },
      ];

      const handleNavigate = (targetPage, filter) => {
        if (filter) setSearchPreset(filter);
        setPage(targetPage);
      };

      const handlePresetConsumed = () => setSearchPreset(null);
      const dynamicStyle = tweaks.accentHue !== 170 ? { '--primary': `oklch(0.75 0.18 ${tweaks.accentHue})` } : {};

      // Page components + their props
      const pageMap = {
        dashboard: { Component: DashboardPage, props: { onNavigate: handleNavigate } },
        search:    { Component: SearchPage,    props: { preset: searchPreset, onPresetConsumed: handlePresetConsumed } },
        devices:   { Component: DevicesPage,   props: {} },
        users:     { Component: UsersPage,     props: {} },
        settings:  { Component: SettingsPage,  props: {} },
      };

      // If not logged in, show login page
      if (!currentUser) {
        return (
          <LangContext.Provider value={lang}>
            <LoginPage onLogin={() => setPage('dashboard')} />
          </LangContext.Provider>
        );
      }

      const { Component: PageComponent, props: pageProps } = pageMap[page] || pageMap.dashboard;

      // Permission-guarded page wrapper
      const PageGuard = ({ module, children }) => {
        if (!can(module, 'view')) {
          return (
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '60vh', flexDirection: 'column', gap: 12 }}>
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke={TOKENS.textMuted} strokeWidth="1"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <div style={{ fontSize: 15, color: TOKENS.textMuted }}>{lang === 'zh' ? '您沒有存取此頁面的權限' : 'You do not have permission to view this page'}</div>
            </div>
          );
        }
        return children;
      };

      return (
        <LangContext.Provider value={lang}>
          <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', ...dynamicStyle }}>
            <Sidebar page={page} setPage={setPage} />
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
              <Header lang={lang} setLang={setLang} notifications={notifications} />
              <div style={{ flex: 1, overflowY: 'auto', animation: 'fadeIn 0.25s ease' }} key={page}>
                <PageGuard module={page}>
                  <PageComponent {...pageProps} />
                </PageGuard>
              </div>
            </div>
          </div>

          <TweaksPanel title="SecVuln Tweaks">
            <TweakSection label={lang === 'zh' ? '外觀設定' : 'Appearance'}>
              <TweakSlider label={lang === 'zh' ? '主色調色相' : 'Accent Hue'} value={tweaks.accentHue} onChange={v => setTweak('accentHue', v)} min={0} max={360} step={5} />
              <TweakRadio label={lang === 'zh' ? '佈局模式' : 'Layout'} value={tweaks.layout} onChange={v => setTweak('layout', v)} options={[{ value: 'sidebar', label: 'Sidebar' }, { value: 'topnav', label: 'Top Nav' }]} />
              <TweakRadio label={lang === 'zh' ? '密度' : 'Density'} value={tweaks.density} onChange={v => setTweak('density', v)} options={[{ value: 'compact', label: lang === 'zh' ? '緊湊' : 'Compact' }, { value: 'comfortable', label: lang === 'zh' ? '舒適' : 'Comfortable' }]} />
            </TweakSection>
          </TweaksPanel>
        </LangContext.Provider>
      );
    }

    function App() {
      return (
        <AuthProvider>
          <AppShell />
        </AuthProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
